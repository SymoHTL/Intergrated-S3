name: Track H publish and AOT validation

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  SOLUTION_PATH: src/IntegratedS3/IntegratedS3.slnx
  WEBUI_PROJECT_PATH: src/IntegratedS3/WebUi/WebUi.csproj

defaults:
  run:
    shell: pwsh

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build solution
        run: dotnet build $env:SOLUTION_PATH -tl:off -v minimal

      - name: Test solution
        run: dotnet test $env:SOLUTION_PATH -tl:off -v minimal --no-build

  publish-aot:
    name: Validate self-contained publish (windows-latest)
    runs-on: windows-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate AOT publish baseline
        run: .\eng\Invoke-AotPublishValidation.ps1 -ProjectPath $env:WEBUI_PROJECT_PATH
