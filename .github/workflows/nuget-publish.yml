name: Publish NuGet Packages

on:
  workflow_dispatch:
    inputs:
      version-suffix:
        description: 'Version suffix (e.g., "preview.1", "rc.1"). Leave empty for stable release.'
        required: false
        type: string
      push-to-nuget:
        description: 'Push packages to NuGet.org'
        required: true
        type: boolean
        default: false
      dry-run:
        description: 'Dry run — pack but do not push'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/IntegratedS3/IntegratedS3.slnx

      - name: Build
        run: dotnet build src/IntegratedS3/IntegratedS3.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test src/IntegratedS3/IntegratedS3.slnx --no-build --configuration Release --verbosity normal

      - name: AOT Validation
        run: pwsh -File eng/Invoke-AotPublishValidation.ps1

  pack-and-publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: version
        run: |
          VERSION_SUFFIX="${{ inputs.version-suffix }}"
          if [ -n "$VERSION_SUFFIX" ]; then
            echo "pack-args=--version-suffix $VERSION_SUFFIX" >> $GITHUB_OUTPUT
            echo "version-label=prerelease ($VERSION_SUFFIX)" >> $GITHUB_OUTPUT
          else
            echo "pack-args=" >> $GITHUB_OUTPUT
            echo "version-label=stable" >> $GITHUB_OUTPUT
          fi

      - name: Pack
        run: |
          dotnet pack src/IntegratedS3/IntegratedS3.slnx \
            --configuration Release \
            --output ./artifacts/packages \
            ${{ steps.version.outputs.pack-args }}

      - name: List packages
        run: ls -la ./artifacts/packages/

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/packages
          retention-days: 90

      - name: Validate NuGet API key
        if: inputs.push-to-nuget == true && inputs.dry-run == false
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "${NUGET_API_KEY//[[:space:]]/}" ]; then
            echo "::error title=Missing NUGET_API_KEY::Repository secret NUGET_API_KEY is required when push-to-nuget is true and dry-run is false. Add the repository secret in Settings > Secrets and variables > Actions, then rerun this workflow."
            exit 1
          fi

      - name: Push to NuGet.org
        if: inputs.push-to-nuget == true && inputs.dry-run == false
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          for pkg in ./artifacts/packages/*.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Publish summary
        run: |
          echo "## NuGet Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version-label }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dry run:** ${{ inputs.dry-run }}" >> $GITHUB_STEP_SUMMARY
          echo "**Push to NuGet:** ${{ inputs.push-to-nuget }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packages" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls ./artifacts/packages/*.nupkg | xargs -I {} basename {} >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
